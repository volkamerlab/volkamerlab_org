name: CI

on:
  push:
    branches: ["master", "hugo-updates"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 3 * * 2"

jobs:
  broken-links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --verbose --no-progress ./public

      - name: Log Results to Summary
        run: |
          if [ -f lychee/report.md ]; then
            echo "## Link Check Results" >> $GITHUB_STEP_SUMMARY
            cat lychee/report.md >> $GITHUB_STEP_SUMMARY
          fi

